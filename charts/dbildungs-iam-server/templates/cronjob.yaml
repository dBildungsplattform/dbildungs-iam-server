{{- if .Values.cronjobs.enabled }}
{{- range $job_name, $job_options := .Values.cronjobs.jobs }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ template "common.names.name" $ }}-{{ $job_name}}
  namespace: {{ template "common.names.namespace" $ }}
spec:
  schedule: {{ $job_options.schedule | quote }}
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            cron: {{ $job_name }}
        spec:
          automountServiceAccountToken: false
          containers:
          - name: {{ $job_name }}
            image: "{{ $.Values.cronjobs.image.repository }}:{{ $.Values.cronjobs.image.tag }}"
            imagePullPolicy: {{ $.Values.cronjobs.image.pullPolicy | default "Always"}}
            securityContext:
              privileged: false
              runAsUser: 1000
              runAsNonRoot: true
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: false
              allowPrivilegeEscalation: false
              seccompProfile:
                type: RuntimeDefault
            envFrom:
              - configMapRef:
                  name:  {{ template "common.names.name" $ }}-cronjob-envs-configmap
            env:
                - name: BACKEND_ENDPOINT_URL
                  value: >-
                      https://{{ if eq $job_options.hostType "email" }}
                        {{ $.Values.emailHostname }}
                      {{ else }}
                        {{ $.Values.backendHostname }}
                      {{ end }}
                      {{ $job_options.endpoint }}
                - name: HTTP_METHOD
                  value: "{{ $job_options.httpMethod }}"
                - name: LOG_FILE_PATH
                  value: "/tmp/log/cron.log"
                - name: AUTH_MODE
                  value: "{{ $job_options.authMode | default "jwt" }}"

            {{- if eq $job_options.authMode "apikey" }}
              - name: INTERNAL_COMMUNICATION_API_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ default .Values.auth.existingSecret .Values.auth.secretName }}
                    key: internal-communication-api-key
            {{- end }}

            resources:
              limits:
                memory: "128Mi"
                cpu: "200m"
              requests:
                memory: "64Mi"
                cpu: "50m"
            command:
              - "sh"
              - "-c"
              - |
                  mkdir /tmp/log/ &&
                  touch /tmp/log/cron.log &&
                  chmod 644 /tmp/log/cron.log &&
                  cd {{ $.Values.cronjobs.scriptDir }} &&
                  bash {{ $job_options.script }}
            volumeMounts:
              - name: secret-volume-jwks
                mountPath: /keys/jwks.json
                subPath: jwks.json
                readOnly: true
              - name: script-volume
                mountPath: /scripts
                readOnly: false
            ports:
            - containerPort: {{ $.Values.cronjobs.port }}
              name: cron-pod
          volumes:
          - name: script-volume
            configMap:
              name: {{ template "common.names.name" $ }}-cronjob-scripts-configmap
              defaultMode: 0555
          - name: secret-volume-jwks
            secret:
              secretName: dbildungs-iam-server
              items:
              - key: service-account-private-jwks
                path: jwks.json
          restartPolicy: Never
---
{{- end}}
{{- end }}
